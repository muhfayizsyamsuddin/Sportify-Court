services:

  client:
    build:
      context: ./Client/sportify-court
    image: faizms14/sportify-court-client:v1.0
    env_file: ./Client/sportify-court/.env
    container_name: sportify-court-client
    ports:
      - 5174:5174
    networks:
      - sportify-court-net
    volumes:
      - ./Client/sportify-court:/app
      - /app/node_modules
  
  server:
    build:
      context: ./Server
    image: faizms14/sportify-court-server:v1.0
    env_file: ./Server/.env
    container_name: sportify-court-server
    ports:
      - 3000:3000
    environment:
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DATABASE_URL=postgres://sportify-court-user:sportify-court-password555@postgres-db:5432/sportify-court-db
    networks:
      - sportify-court-net
    volumes:
      - ./Server:/app
      - /app/node_modules
  
  database:
    image: postgres:16-alpine
    env_file: ./Server/.env
    container_name: sportify-court-db
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=sportify-court-user
      - POSTGRES_PASSWORD=sportify-court-password555
      - POSTGRES_DB=sportify-court-db
    volumes:
      - sportify-court-db-volume:/var/lib/postgresql/data
    networks:
      - sportify-court-net

  adminer:
    image: adminer:latest
    env_file: ./Server/.env
    container_name: sportify-court-adminer
    ports:
      - 8000:8080
    networks:
      - sportify-court-net

networks:
  sportify-court-net:
    driver: bridge

volumes:
  sportify-court-db-volume: